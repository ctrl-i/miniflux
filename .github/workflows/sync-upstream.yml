name: Sync Upstream

on:
  schedule:
    - cron: '15 */6 * * *'  # Every 6 hours
  workflow_dispatch:         # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      sync_happened: ${{ steps.check_sync.outputs.sync_happened }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up upstream
        run: |
          git remote add upstream https://github.com/miniflux/v2.git || true
          git fetch upstream main

      - name: Check if upstream has new commits
        id: check_sync
        run: |
          LOCAL_COMMIT=$(git rev-parse HEAD)
          UPSTREAM_COMMIT=$(git rev-parse upstream/main)
          if [ "$UPSTREAM_COMMIT" = "$LOCAL_COMMIT" ]; then
            echo "Upstream is up to date; no sync needed."
            echo "sync_happened=false" >> "$GITHUB_OUTPUT"
          else
            echo "Upstream has new commits; sync needed."
            echo "sync_happened=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync and push upstream changes
        if: ${{ steps.check_sync.outputs.sync_happened == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge upstream/main --no-edit
          git push origin main

  # Only run Docker build if upstream actually changed
  docker:
    needs: sync
    if: ${{ needs.sync.outputs.sync_happened == 'true' }}
    uses: ./.github/workflows/docker-build.yml
    secrets: inherit
