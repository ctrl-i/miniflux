name: Sync Upstream
on:
  schedule:
    - cron: '15 */6 * * *'  # Every Monday 2AM UTC
  workflow_dispatch:     # Manual trigger too
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    
    - name: Sync miniflux/v2
      run: |
        git remote add upstream https://github.com/miniflux/v2.git || true
        git fetch upstream main
        git checkout main
        git merge upstream/main --no-edit
        git push origin main
    
    - name: Trigger Docker build
      run: |
        curl -X POST \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/ctrl-i/miniflux/actions/workflows/docker-build.yml/dispatches \
          -d '{"ref":"main"}'
