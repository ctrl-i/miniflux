name: Rebase main and build Docker

on:
  schedule:
    - cron: '5 */6 * * *'    # every hour at minute 5, after sync job
  workflow_dispatch:        # optional: manual run

jobs:
  rebase-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Fetch tracking branch
        run: |
          git fetch origin upstream-main

      - name: Rebase main onto upstream-main
        run: |
          git rebase origin/upstream-main || {
            echo "Rebase failed with conflicts – fix manually."
            exit 1
          }
          git push origin main --force-with-lease

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packaging/docker/alpine/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64/v8
          tags: |
            aboffin/miniflux-with-descriptions:latest
