name: Sync Upstream

on:
  schedule:
    - cron: '15 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      sync_happened: ${{ steps.check_sync.outputs.sync_happened }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up upstream
        run: |
          git remote add upstream https://github.com/miniflux/v2.git || true
          git fetch upstream main

      - name: Check if upstream has new commits
        id: check_sync
        run: |
          git checkout main
          LOCAL_COMMIT=$(git rev-parse main)
          UPSTREAM_COMMIT=$(git rev-parse upstream/main)
          echo "Local main:    $LOCAL_COMMIT"
          echo "Upstream main: $UPSTREAM_COMMIT"

          if git merge-base --is-ancestor "$LOCAL_COMMIT" "$UPSTREAM_COMMIT"; then
            echo "Upstream is behind or equal; no sync needed."
            echo "sync_happened=false" >> "$GITHUB_OUTPUT"
          else
            echo "Upstream has new commits ahead; sync needed."
            echo "sync_happened=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync and push upstream changes
        if: ${{ steps.check_sync.outputs.sync_happened == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge upstream/main --no-edit
          git push origin main

  docker:
    needs: sync
    if: ${{ needs.sync.outputs.sync_happened == 'true' }}
    uses: ./.github/workflows/docker-build.yml
    secrets: inherit
